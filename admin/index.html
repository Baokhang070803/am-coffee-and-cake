<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Netlify CMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/netlify-cms@2.15.0/dist/cms.min.css">
</head>
<body>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'Baokhang070803/am-coffee-and-cake', // Tên repo của bạn trên GitHub
          branch: 'main', // Nhánh bạn đang sử dụng
          auth_type: 'oauth', // Sử dụng OAuth để đăng nhập
          client_id: '<your-client-id>', // Thêm Client ID ở đây
          client_secret: '<your-client-secret>', // Thêm Client Secret ở đây
        },
        media_folder: 'static/uploads', // Thư mục chứa hình ảnh tải lên
        public_folder: '/uploads', // Đường dẫn công khai cho hình ảnh
        collections: [
          {
            name: 'blog',
            label: 'Blog',
            folder: 'content/blog',
            create: true,
            slug: '{{slug}}',
            fields: [
              { label: 'Title', name: 'title', widget: 'string' },
              { label: 'Date', name: 'date', widget: 'datetime' },
              { label: 'Body', name: 'body', widget: 'markdown' },
            ],
          },
          // Thêm các collection khác nếu cần
        ],
      },
    });
  </script>
  
</body>
</html>
