backend:
  name: 'github'
  repo: 'Baokhang070803/am-coffee-and-cake'  # Đảm bảo repo chính xác
  branch: 'main'
  auth_type: 'oauth'
  client_id: 'Ov23lis28jTmt3hUqeBx'
  client_secret: '42793935b499ce650455a386168580d22ea2ca4a'

media_folder: 'static/uploads'
public_folder: '/uploads'

collections:
  - name: "posts"
    label: "Bài viết"
    folder: "posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Tiêu đề", name: "title", widget: "string" }
      - { label: "Ngày đăng", name: "date", widget: "datetime" }
      - { label: "Nội dung", name: "body", widget: "markdown" }
